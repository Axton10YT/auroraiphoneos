name: Build Aurora IPA

on:
  workflow_dispatch: {}
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: |
          ls /Applications | grep Xcode
          sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Extract AuroraiOS.zip and merge scaffolding
        run: |
          rm -rf _extracted
          mkdir _extracted
          unzip -o AuroraiOS.zip -d _extracted
          echo "--- extracted tree ---"
          find _extracted -maxdepth 4

          PROJECT_DIR=$(dirname "$(find _extracted -name AuroraApp.swift | head -n1)")/..
          PROJECT_DIR=$(cd "$PROJECT_DIR" && pwd)
          if [ -z "$PROJECT_DIR" ]; then
            echo "Couldn't locate the extracted AuroraiOS source folder"
            exit 1
          fi
          echo "Using PROJECT_DIR=$PROJECT_DIR"

          cp project.yml "$PROJECT_DIR/" 2>/dev/null || echo "WARNING: project.yml not found at repo root"
          if [ -d Resources ]; then
            cp -r Resources "$PROJECT_DIR/"
          else
            echo "WARNING: Resources/ not found at repo root"
          fi

          echo "--- final project dir ---"
          find "$PROJECT_DIR" -maxdepth 2

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ${{ env.PROJECT_DIR }}
        run: xcodegen generate

      - name: Build unsigned app
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          xcodebuild -project Aurora.xcodeproj \
            -scheme Aurora \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$RUNNER_TEMP/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            build

      - name: Package unsigned IPA
        run: |
          set -e
          APP_PATH="$RUNNER_TEMP/build/Build/Products/Release-iphoneos/Aurora.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Aurora.app not found at $APP_PATH"
            find "$RUNNER_TEMP/build" -maxdepth 6 -name "*.app"
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/export/Payload"
          cp -r "$APP_PATH" "$RUNNER_TEMP/export/Payload/"
          cd "$RUNNER_TEMP/export"
          zip -r Aurora-unsigned.ipa Payload
          ls -la

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Aurora-ipa
          path: ${{ runner.temp }}/export/Aurora-unsigned.ipa
