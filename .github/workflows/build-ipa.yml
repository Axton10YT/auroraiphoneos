name: Build Aurora IPA

on:
  workflow_dispatch: {}
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract AuroraiOS.zip and merge scaffolding
        run: |
          rm -rf _extracted
          mkdir _extracted
          unzip -o AuroraiOS.zip -d _extracted
          echo "--- extracted tree ---"
          find _extracted -maxdepth 4

          PROJECT_DIR=$(dirname "$(find _extracted -name AuroraApp.swift | head -n1)")/..
          PROJECT_DIR=$(cd "$PROJECT_DIR" && pwd)
          if [ -z "$PROJECT_DIR" ]; then
            echo "Couldn't locate the extracted AuroraiOS source folder"
            exit 1
          fi
          echo "Using PROJECT_DIR=$PROJECT_DIR"

          cp project.yml "$PROJECT_DIR/" 2>/dev/null || echo "WARNING: project.yml not found at repo root"
          cp exportOptions.template.plist "$PROJECT_DIR/" 2>/dev/null || echo "WARNING: exportOptions.template.plist not found at repo root"
          if [ -d Resources ]; then
            cp -r Resources "$PROJECT_DIR/"
          else
            echo "WARNING: Resources/ not found at repo root"
          fi

          echo "--- final project dir ---"
          find "$PROJECT_DIR" -maxdepth 2

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ${{ env.PROJECT_DIR }}
        run: xcodegen generate

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app

      # --- Signing setup -----------------------------------------------
      # Requires these repo secrets (see CI_SETUP.md for how to produce them,
      # no Mac needed — openssl + the Apple Developer web portal):
      #   APPLE_DIST_CERT_P12_BASE64   base64 of your distribution .p12
      #   APPLE_DIST_CERT_PASSWORD     password you set on that .p12
      #   APPLE_PROVISION_PROFILE_BASE64  base64 of the .mobileprovision
      #   APPLE_TEAM_ID                 your 10-char Apple Developer Team ID
      #   PROVISIONING_PROFILE_SPECIFIER  the profile's name (as set in the portal)
      #   KEYCHAIN_PASSWORD             any throwaway password for the temp CI keychain
      - name: Import signing certificate and profile
        env:
          P12_BASE64: ${{ secrets.APPLE_DIST_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_DIST_CERT_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -e
          CERT_PATH=$RUNNER_TEMP/dist_cert.p12
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain

          echo -n "$P12_BASE64" | base64 --decode -o $CERT_PATH
          echo -n "$PROFILE_BASE64" | base64 --decode -o $PROFILE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERT_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH login.keychain
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(grep -A1 UUID $PROFILE_PATH | grep string | sed -e 's/<string>//' -e 's/<\/string>//' | tr -d '[:space:]')
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      - name: Archive
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.PROVISIONING_PROFILE_SPECIFIER }}
        run: |
          xcodebuild -project Aurora.xcodeproj \
            -scheme Aurora \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/Aurora.xcarchive \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE_SPECIFIER" \
            archive

      - name: Prepare export options
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.PROVISIONING_PROFILE_SPECIFIER }}
        run: |
          sed -e "s/__DEVELOPMENT_TEAM__/$DEVELOPMENT_TEAM/" \
              -e "s/__PROVISIONING_PROFILE_SPECIFIER__/$PROVISIONING_PROFILE_SPECIFIER/" \
              exportOptions.template.plist > $RUNNER_TEMP/exportOptions.plist

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Aurora.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/exportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Aurora-ipa
          path: ${{ runner.temp }}/export/*.ipa
