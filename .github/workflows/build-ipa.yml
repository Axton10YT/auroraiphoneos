name: Build Aurora IPA

on:
  workflow_dispatch: {}
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Import signing certificate and profile
        env:
          P12_BASE64: ${{ secrets.APPLE_DIST_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_DIST_CERT_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -e
          CERT_PATH=$RUNNER_TEMP/dist_cert.p12
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain

          echo -n "$P12_BASE64" | base64 --decode -o $CERT_PATH
          echo -n "$PROFILE_BASE64" | base64 --decode -o $PROFILE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERT_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH login.keychain
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(grep -A1 UUID $PROFILE_PATH | grep string | sed -e 's/<string>//' -e 's/<\/string>//' | tr -d '[:space:]')
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      - name: Archive
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.PROVISIONING_PROFILE_SPECIFIER }}
        run: |
          xcodebuild -project Aurora.xcodeproj \
            -scheme Aurora \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/Aurora.xcarchive \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE_SPECIFIER" \
            archive

      - name: Prepare export options
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.PROVISIONING_PROFILE_SPECIFIER }}
        run: |
          sed -e "s/__DEVELOPMENT_TEAM__/$DEVELOPMENT_TEAM/" \
              -e "s/__PROVISIONING_PROFILE_SPECIFIER__/$PROVISIONING_PROFILE_SPECIFIER/" \
              exportOptions.template.plist > $RUNNER_TEMP/exportOptions.plist

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Aurora.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/exportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Aurora-ipa
          path: ${{ runner.temp }}/export/*.ipa
